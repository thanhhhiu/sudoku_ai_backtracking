<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Backtracking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div id="welcome-screen">
        <div class="welcome-box">
            <h1>LIV - SUDOKU</h1>
            <button id="btn-start">BẮT ĐẦU</button>
        </div>
    </div>

    <div id="app-container">
        <header class="app-header">
            <button id="btn-toggle-history">☰ Lịch Sử </button>
            <div class="app-title">LIV - SUDOKU</div>
            <button id="btn-toggle-tools">☰ Công Cụ</button>
        </header>

        <div id="main-layout">
            <aside id="left-sidebar" class="hidden">
                <h3>Lịch Sử Các Bài Giải </h3>
                
                <div id="history-list">
                    </div>
                
                <button id="btn-clear-history" class="btn-danger" style="margin-top: auto; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer;">
                    <i class="fa-solid fa-trash"></i> Clear all
                </button>
            </aside>

            <main id="center-content">
                
                <div class="sudoku-container">
                    <table id="sudoku-board">
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-0-0"></td>
                            <td><input type="text" maxlength="1" id="cell-0-1"></td>
                            <td><input type="text" maxlength="1" id="cell-0-2"></td>
                            <td><input type="text" maxlength="1" id="cell-0-3"></td>
                            <td><input type="text" maxlength="1" id="cell-0-4"></td>
                            <td><input type="text" maxlength="1" id="cell-0-5"></td>
                            <td><input type="text" maxlength="1" id="cell-0-6"></td>
                            <td><input type="text" maxlength="1" id="cell-0-7"></td>
                            <td><input type="text" maxlength="1" id="cell-0-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-1-0"></td>
                            <td><input type="text" maxlength="1" id="cell-1-1"></td>
                            <td><input type="text" maxlength="1" id="cell-1-2"></td>
                            <td><input type="text" maxlength="1" id="cell-1-3"></td>
                            <td><input type="text" maxlength="1" id="cell-1-4"></td>
                            <td><input type="text" maxlength="1" id="cell-1-5"></td>
                            <td><input type="text" maxlength="1" id="cell-1-6"></td>
                            <td><input type="text" maxlength="1" id="cell-1-7"></td>
                            <td><input type="text" maxlength="1" id="cell-1-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-2-0"></td>
                            <td><input type="text" maxlength="1" id="cell-2-1"></td>
                            <td><input type="text" maxlength="1" id="cell-2-2"></td>
                            <td><input type="text" maxlength="1" id="cell-2-3"></td>
                            <td><input type="text" maxlength="1" id="cell-2-4"></td>
                            <td><input type="text" maxlength="1" id="cell-2-5"></td>
                            <td><input type="text" maxlength="1" id="cell-2-6"></td>
                            <td><input type="text" maxlength="1" id="cell-2-7"></td>
                            <td><input type="text" maxlength="1" id="cell-2-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-3-0"></td>
                            <td><input type="text" maxlength="1" id="cell-3-1"></td>
                            <td><input type="text" maxlength="1" id="cell-3-2"></td>
                            <td><input type="text" maxlength="1" id="cell-3-3"></td>
                            <td><input type="text" maxlength="1" id="cell-3-4"></td>
                            <td><input type="text" maxlength="1" id="cell-3-5"></td>
                            <td><input type="text" maxlength="1" id="cell-3-6"></td>
                            <td><input type="text" maxlength="1" id="cell-3-7"></td>
                            <td><input type="text" maxlength="1" id="cell-3-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-4-0"></td>
                            <td><input type="text" maxlength="1" id="cell-4-1"></td>
                            <td><input type="text" maxlength="1" id="cell-4-2"></td>
                            <td><input type="text" maxlength="1" id="cell-4-3"></td>
                            <td><input type="text" maxlength="1" id="cell-4-4"></td>
                            <td><input type="text" maxlength="1" id="cell-4-5"></td>
                            <td><input type="text" maxlength="1" id="cell-4-6"></td>
                            <td><input type="text" maxlength="1" id="cell-4-7"></td>
                            <td><input type="text" maxlength="1" id="cell-4-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-5-0"></td>
                            <td><input type="text" maxlength="1" id="cell-5-1"></td>
                            <td><input type="text" maxlength="1" id="cell-5-2"></td>
                            <td><input type="text" maxlength="1" id="cell-5-3"></td>
                            <td><input type="text" maxlength="1" id="cell-5-4"></td>
                            <td><input type="text" maxlength="1" id="cell-5-5"></td>
                            <td><input type="text" maxlength="1" id="cell-5-6"></td>
                            <td><input type="text" maxlength="1" id="cell-5-7"></td>
                            <td><input type="text" maxlength="1" id="cell-5-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-6-0"></td>
                            <td><input type="text" maxlength="1" id="cell-6-1"></td>
                            <td><input type="text" maxlength="1" id="cell-6-2"></td>
                            <td><input type="text" maxlength="1" id="cell-6-3"></td>
                            <td><input type="text" maxlength="1" id="cell-6-4"></td>
                            <td><input type="text" maxlength="1" id="cell-6-5"></td>
                            <td><input type="text" maxlength="1" id="cell-6-6"></td>
                            <td><input type="text" maxlength="1" id="cell-6-7"></td>
                            <td><input type="text" maxlength="1" id="cell-6-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-7-0"></td>
                            <td><input type="text" maxlength="1" id="cell-7-1"></td>
                            <td><input type="text" maxlength="1" id="cell-7-2"></td>
                            <td><input type="text" maxlength="1" id="cell-7-3"></td>
                            <td><input type="text" maxlength="1" id="cell-7-4"></td>
                            <td><input type="text" maxlength="1" id="cell-7-5"></td>
                            <td><input type="text" maxlength="1" id="cell-7-6"></td>
                            <td><input type="text" maxlength="1" id="cell-7-7"></td>
                            <td><input type="text" maxlength="1" id="cell-7-8"></td>
                        </tr>
                        <tr>
                            <td><input type="text" maxlength="1" id="cell-8-0"></td>
                            <td><input type="text" maxlength="1" id="cell-8-1"></td>
                            <td><input type="text" maxlength="1" id="cell-8-2"></td>
                            <td><input type="text" maxlength="1" id="cell-8-3"></td>
                            <td><input type="text" maxlength="1" id="cell-8-4"></td>
                            <td><input type="text" maxlength="1" id="cell-8-5"></td>
                            <td><input type="text" maxlength="1" id="cell-8-6"></td>
                            <td><input type="text" maxlength="1" id="cell-8-7"></td>
                            <td><input type="text" maxlength="1" id="cell-8-8"></td>
                        </tr>
                    </table>
                </div>

                <div class="bottom-bar">
                    <div class="control-buttons">
                        <button id="btn-solve" class="btn-primary">GIẢI AI</button>
                        <button id="btn-clear" class="btn-danger">XÓA BẢNG</button>
                        <button id="btn-new-game" class="btn-success">GAME MỚI</button>
                    </div>
                    <div class="top-bar">
                        <label for="difficulty-select">Độ khó: </label>
                        <select id="difficulty-select">
                            <option value="1">Tự Nhập</option>
                            <option value="2">Dễ</option>
                            <option value="3">Trung bình</option>
                            <option value="4">Khó</option>
                            <option value="5">Ngẫu nhiên</option>
                        </select>
                    </div>

                    <div id="ai-stats">
                        <p>⏱ Thời gian: <span id="stat-time">0.000</span> giây</p>
                        <p>↩︎ Quay lui: <span id="stat-backtracks">0</span> lần</p>
                    </div>
                </div>
            </main>

            <aside id="right-sidebar" class="hidden">
                <h3><i class="fa-solid fa-screwdriver-wrench"></i> Công cụ</h3>
                <div class="game-info-sidebar">
                <div class="info-box">
                <i class="fa-regular fa-clock"></i> <span id="timer-display">00:00</span>
                </div>
                <div class="info-box">
                <i class="fa-solid fa-triangle-exclamation"></i> Lỗi:<span id="mistakes-display">0</span>/5
                </div>
                </div>
                <div class="tools-row">
                    <button id="btn-undo">↩ Hoàn tác</button>
                    <button id="btn-erase">Xoá</button>
                    <button id="btn-pencil" class="pencil-off">✎ Ghi chú: <span id="pencil-status">Tắt</span></button>
                </div>
                <div class="numpad">
                    <button class="num-btn">1</button><button class="num-btn">2</button><button class="num-btn">3</button>
                    <button class="num-btn">4</button><button class="num-btn">5</button><button class="num-btn">6</button>
                    <button class="num-btn">7</button><button class="num-btn">8</button><button class="num-btn">9</button>
                </div>
                <div class="sidebar-bottom-actions">
                    <button id="btn-dark-mode"><i class="fa-solid fa-moon"></i> Chế độ Tối</button>
                    <select id="bg-selector">
                        <option value="images/bg.jpg">Nền Mặc Định</option>

                        <option value="images/bien.jpeg">Nền Biển Xanh</option>

                        <option value="images/nuituyet.jpeg"> Nền Núi Tuyết </option>

                        <option value="images/Rungsuong.jpeg">Nền Rừng Sương </option>
                    </select>
                </div>
            </aside>
        </div>
    </div>

    <div id="board-modal" class="hidden">
        <div class="modal-content glass-effect">
            <span id="close-modal">&times;</span>
            <h2 id="modal-title">Chi tiết bản ghi</h2>
            
            <div id="modal-board-container"></div>
            
            <button id="btn-delete-single" class="btn-danger" style="margin-top: 15px; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer;">
                <i class="fa-solid fa-trash"></i> Xóa bản ghi này
            </button>
        </div>
    </div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
</body>
</html>
